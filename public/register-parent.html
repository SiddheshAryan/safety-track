<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-center">
    <div class="card slide-in">
      <h2 class="page-title" style="text-align:center; margin-bottom: 10px;">Parent Registration</h2>
      <p class="page-subtitle" style="text-align:center; margin-bottom: 22px;">
        Register a parent profile to monitor a student in real time.
      </p>

      <form id="parentRegisterForm">
        <label for="name">Parent Name</label>
        <input type="text" id="name" placeholder="Enter parent name" required />

        <label for="child_roll">Child Roll Number</label>
        <input type="text" id="child_roll" placeholder="Enter child roll number" required />

        <label for="mobile">Mobile Number</label>
        <input type="text" id="mobile" placeholder="Enter mobile number" required />

        <button type="submit">Register Parent</button>
      </form>

      <div class="button-row" style="margin-top: 16px;">
        <a href="select-role.html?mode=register" class="secondary-btn">Back</a>
      </div>

      <p id="message" class="message" style="text-align:center;"></p>
    </div>
  </div>

  <div class="footer-credit">Designed by R Siddhesh Aryan</div>

  <script>
    const form = document.getElementById("parentRegisterForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        child_roll: document.getElementById("child_roll").value.trim(),
        mobile: document.getElementById("mobile").value.trim()
      };

      try {
        const response = await fetch("/register/parent", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          message.textContent = "Parent registered successfully.";
          form.reset();

          setTimeout(() => {
            window.location.href = `parent.html?roll=${encodeURIComponent(payload.child_roll)}`;
          }, 900);
        } else {
          message.textContent = result.message || "Parent registration failed.";
        }
      } catch (error) {
        message.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>
</html>

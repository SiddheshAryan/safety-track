<!DOCTYPE html>
<html>
<head>
<title>Parent Registration</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#b8e3d3,#c5ddf0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
width:450px;
}

h2{
text-align:center;
color:#055f6b;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:18px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#2f6fb8;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Parent Registration</h2>

<form action="/register-parent" method="POST">

<input name="name" placeholder="Parent Name">

<input name="mobile" placeholder="Mobile Number">

<input name="student_roll" placeholder="Student Roll Number">

<input type="password" name="password" placeholder="Password">

<button type="submit">Register Parent</button>

</form>

</div>

</body>
</html>

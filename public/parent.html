<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="page-wrap">
    <div class="dashboard fade-in">
      <div class="dashboard-header">
        <div>
          <h1 class="dashboard-title">Parent Dashboard</h1>
          <p class="page-subtitle">Monitor your child’s live movement and route history.</p>
        </div>
        <a href="index.html" class="secondary-btn">Logout</a>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <strong>Tracking Roll Number</strong>
          <span id="childRollText">Loading...</span>
        </div>

        <div class="info-box">
          <strong>Status</strong>
          <span id="parentStatusPill" class="status-pill">Waiting...</span>
        </div>

        <div class="info-box">
          <strong>Route Info</strong>
          <span id="routeInfoText">No route points yet.</span>
        </div>
      </div>

      <p id="parentStatusText" class="message" style="margin-bottom: 16px;">Waiting for location...</p>

      <div class="map-shell">
        <div id="map" class="map-container"></div>
      </div>
    </div>
  </div>

  <div class="footer-credit">Designed by R Siddhesh Aryan</div>

  <script>
    const socket = io();

    const params = new URLSearchParams(window.location.search);
    const roll = params.get("roll");

    const childRollText = document.getElementById("childRollText");
    const parentStatusText = document.getElementById("parentStatusText");
    const parentStatusPill = document.getElementById("parentStatusPill");
    const routeInfoText = document.getElementById("routeInfoText");

    function setParentStatus(type, text, pillText) {
      parentStatusText.textContent = text;
      parentStatusPill.textContent = pillText || text;
      parentStatusPill.className = "status-pill";

      if (type === "live") {
        parentStatusPill.classList.add("status-live");
      } else if (type === "stop") {
        parentStatusPill.classList.add("status-stop");
      }
    }

    if (!roll) {
      childRollText.textContent = "No roll number found";
      setParentStatus("stop", "Tracking unavailable. Please login again.", "Unavailable");
    } else {
      childRollText.textContent = roll;
    }

    const map = L.map("map").setView([20.5937, 78.9629], 5);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let startMarker = null;
    let currentMarker = null;
    let stopMarker = null;
    let routeLine = null;
    let routePoints = [];

    const startIcon = L.divIcon({
      className: "",
      html: `
        <div style="
          width:18px;
          height:18px;
          background:#ff3b30;
          border:3px solid white;
          border-radius:50%;
          box-shadow:0 0 12px rgba(0,0,0,0.35);
        "></div>
      `,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    const currentIcon = L.divIcon({
      className: "",
      html: `
        <div style="
          width:18px;
          height:18px;
          background:#007aff;
          border:3px solid white;
          border-radius:50%;
          box-shadow:0 0 12px rgba(0,0,0,0.35);
        "></div>
      `,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    const stopIcon = L.divIcon({
      className: "",
      html: `
        <div style="
          width:18px;
          height:18px;
          background:#34c759;
          border:3px solid white;
          border-radius:50%;
          box-shadow:0 0 12px rgba(0,0,0,0.35);
        "></div>
      `,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    function refreshRouteInfo() {
      routeInfoText.textContent = `${routePoints.length} point${routePoints.length === 1 ? "" : "s"} recorded`;
    }

    function drawRoute() {
      if (routeLine) {
        map.removeLayer(routeLine);
      }

      routeLine = L.polyline(routePoints, {
        color: "blue",
        weight: 5,
        opacity: 0.82
      }).addTo(map);

      refreshRouteInfo();
    }

    function updateMapPoint(lat, lng, status) {
      const point = [lat, lng];

      if (status === "start") {
        if (startMarker) map.removeLayer(startMarker);
        if (currentMarker) {
          map.removeLayer(currentMarker);
          currentMarker = null;
        }
        if (stopMarker) {
          map.removeLayer(stopMarker);
          stopMarker = null;
        }

        startMarker = L.marker(point, { icon: startIcon }).addTo(map).bindPopup("Start Location");
        routePoints = [point];
        drawRoute();
        setParentStatus("live", "Tracking started.", "Started");
        map.setView(point, 18);
        return;
      }

      if (status === "tracking") {
        routePoints.push(point);
        drawRoute();

        if (currentMarker) {
          map.removeLayer(currentMarker);
        }

        currentMarker = L.marker(point, { icon: currentIcon }).addTo(map).bindPopup("Current Location");
        setParentStatus("live", "Live tracking in progress...", "Live");
        map.setView(point, 18);
        return;
      }

      if (status === "stop") {
        routePoints.push(point);
        drawRoute();

        if (currentMarker) {
          map.removeLayer(currentMarker);
          currentMarker = null;
        }

        if (stopMarker) {
          map.removeLayer(stopMarker);
        }

        stopMarker = L.marker(point, { icon: stopIcon }).addTo(map).bindPopup("Stop Location");
        setParentStatus("stop", "Tracking stopped.", "Stopped");
        map.setView(point, 18);
      }
    }

    async function loadPreviousHistory() {
      if (!roll) return;

      try {
        const response = await fetch(`/location-history/${roll}`);
        const result = await response.json();

        if (!result.success || !result.data || result.data.length === 0) {
          setParentStatus("stop", "No location history found yet.", "No Data");
          refreshRouteInfo();
          return;
        }

        for (const item of result.data) {
          updateMapPoint(item.latitude, item.longitude, item.status);
        }
      } catch (error) {
        setParentStatus("stop", "Could not load location history.", "Error");
      }
    }

    if (roll) {
      socket.emit("joinParentRoom", roll);

      socket.on("locationReceive", (data) => {
        if (data.roll !== roll) return;
        updateMapPoint(data.lat, data.lng, data.status);
      });

      loadPreviousHistory();
    }
  </script>
</body>
</html>

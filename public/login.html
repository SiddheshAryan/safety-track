<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#b8e3d3,#c5ddf0);
}

.container{
width:420px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(14px);
border-radius:24px;
padding:40px;
box-shadow:0 18px 40px rgba(0,0,0,0.15);
text-align:center;
}

.title{
font-size:32px;
font-weight:800;
color:#055f6b;
margin-bottom:8px;
}

.subtitle{
color:#4a6770;
margin-bottom:30px;
}

input{
width:100%;
padding:12px;
margin-bottom:18px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
background:linear-gradient(135deg,#4c8ed9,#2f6fb8);
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
transform:translateY(-2px);
}

.back{
display:inline-block;
margin-top:18px;
text-decoration:none;
color:#2f6fb8;
font-weight:600;
}

.footer{
position:fixed;
bottom:12px;
width:100%;
text-align:center;
font-weight:700;
color:#1a4655;
}

</style>

</head>

<body>

<div class="container">

<div class="title">Parent Login</div>
<div class="subtitle">Login using student's roll number</div>

<form action="/parent-login" method="POST">

<input
type="text"
name="student_roll"
placeholder="Student Roll Number"
required
>

<input
type="password"
name="password"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

<a class="back" href="/index.html">
Back
</a>

</div>

<div class="footer">
Designed by R Siddhesh Aryan
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #b8e3d3 0%, #c5ddf0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 72px;
      position: relative;
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      pointer-events: none;
    }

    body::before {
      top: -80px;
      left: -80px;
      background: rgba(255, 255, 255, 0.55);
    }

    body::after {
      bottom: -80px;
      right: -80px;
      background: rgba(76, 142, 217, 0.22);
    }

    .login-wrap {
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .login-card {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 18px 50px rgba(16, 55, 72, 0.14);
      border-radius: 28px;
      padding: 42px 32px 30px;
      animation: fadeUp 0.65s ease;
    }

    .title {
      margin: 0 0 8px;
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      color: #055f6b;
      letter-spacing: -0.03em;
    }

    .subtitle {
      text-align: center;
      color: #4a6770;
      margin: 0 0 28px;
      font-size: 1rem;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(76, 142, 217, 0.12);
      color: #2f6fb8;
      font-weight: 700;
      margin: 0 auto 24px;
      display: flex;
      width: fit-content;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #123a47;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 14px 14px;
      margin-bottom: 18px;
      border-radius: 14px;
      border: 1px solid #d6dee2;
      background: rgba(255,255,255,0.95);
      font-size: 15px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: #4c8ed9;
      box-shadow: 0 0 0 4px rgba(76, 142, 217, 0.14);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 15px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      background: linear-gradient(135deg, #4c8ed9, #2f6fb8);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 14px 28px rgba(76, 142, 217, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 32px rgba(76, 142, 217, 0.32);
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .link-btn {
      text-decoration: none;
      color: #2f6fb8;
      font-weight: 700;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(76, 142, 217, 0.16);
      padding: 12px 18px;
      border-radius: 14px;
      transition: 0.2s ease;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(16, 55, 72, 0.1);
    }

    .message {
      text-align: center;
      margin-top: 16px;
      font-weight: 700;
      color: #c0392b;
      min-height: 22px;
    }

    .footer-credit {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 12px;
      text-align: center;
      font-size: 0.96rem;
      font-weight: 700;
      color: #1a4655;
      z-index: 2;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .login-card {
        padding: 34px 20px 24px;
        border-radius: 22px;
      }

      .title {
        font-size: 2rem;
      }

      .actions {
        flex-direction: column;
      }

      .link-btn {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="title">Login</h1>
      <p class="subtitle">Continue with your selected role</p>

      <div class="role-badge" id="roleBadge">Role: Student</div>

      <form id="loginForm">
        <div id="fieldGroup1">
          <label id="label1" for="identifier">Roll Number</label>
          <input type="text" id="identifier" name="identifier" placeholder="Enter roll number" required />
        </div>

        <div id="fieldGroup2">
          <label id="label2" for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <div class="actions">
        <a class="link-btn" href="/select-role.html?mode=login">Change Role</a>
        <a class="link-btn" href="/index.html">Back Home</a>
      </div>

      <div class="message" id="message"></div>
    </div>
  </div>

  <div class="footer-credit">Designed by R Siddhesh Aryan</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const role = (params.get("role") || "").toLowerCase();

    const roleBadge = document.getElementById("roleBadge");
    const label1 = document.getElementById("label1");
    const identifier = document.getElementById("identifier");
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    if (!["student", "parent", "faculty"].includes(role)) {
      window.location.href = "/select-role.html?mode=login";
    }

    if (role === "student") {
      roleBadge.textContent = "Role: Student";
      label1.textContent = "Roll Number";
      identifier.placeholder = "Enter roll number";
    }

    if (role === "parent") {
      roleBadge.textContent = "Role: Parent";
      label1.textContent = "Student Roll Number";
      identifier.placeholder = "Enter student roll number";
    }

    if (role === "faculty") {
      roleBadge.textContent = "Role: Faculty";
      label1.textContent = "Faculty ID";
      identifier.placeholder = "Enter faculty ID";
    }

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const idValue = identifier.value.trim();
      const passwordValue = document.getElementById("password").value.trim();

      if (!idValue || !passwordValue) {
        message.textContent = "Please fill all fields.";
        return;
      }

      try {
        let endpoint = "";
        let payload = {};

        if (role === "student") {
          endpoint = "/login/student";
          payload = {
            roll: idValue,
            password: passwordValue
          };
        }

        if (role === "parent") {
          endpoint = "/login/parent";
          payload = {
            student_roll: idValue,
            password: passwordValue
          };
        }

        if (role === "faculty") {
          endpoint = "/login/faculty";
          payload = {
            faculty_id: idValue,
            password: passwordValue
          };
        }

        const response = await fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!result.success) {
          message.textContent = result.message || "Login failed.";
          return;
        }

        if (role === "student") {
          window.location.href = `/student.html?roll=${encodeURIComponent(idValue)}`;
          return;
        }

        if (role === "parent") {
          window.location.href = `/parent.html?roll=${encodeURIComponent(idValue)}`;
          return;
        }

        if (role === "faculty") {
          window.location.href = `/faculty.html?faculty_id=${encodeURIComponent(idValue)}`;
        }
      } catch (error) {
        message.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#b8e3d3,#c5ddf0);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
width:550px;
}

h2{
text-align:center;
color:#055f6b;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:18px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#2f6fb8;
color:white;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4f8f;
}

</style>

</head>

<body>

<div class="card">

<h2>Student Registration</h2>

<form action="/register-student" method="POST">

<input name="name" placeholder="Student Name" required>

<input name="roll" placeholder="Roll Number" required>

<select name="gender">
<option>Male</option>
<option>Female</option>
</select>

<input name="department" placeholder="Department">

<select name="faculty_id">
<option value="1">Dr A</option>
<option value="2">Dr B</option>
<option value="3">Dr C</option>
</select>

<input name="mother" placeholder="Mother Name">

<input name="father" placeholder="Father Name">

<input name="parent_mobile" placeholder="Parent Mobile">

<input type="password" name="password" placeholder="Password">

<button type="submit">Register Student</button>

</form>

</div>

</body>
</html>

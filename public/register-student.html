<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-center">
    <div class="card slide-in">
      <h2 class="page-title" style="text-align:center; margin-bottom: 10px;">Student Registration</h2>
      <p class="page-subtitle" style="text-align:center; margin-bottom: 22px;">
        Create a student profile for live safety tracking.
      </p>

      <form id="studentRegisterForm">
        <label for="name">Student Name</label>
        <input type="text" id="name" placeholder="Enter student name" required />

        <label for="roll">Roll Number</label>
        <input type="text" id="roll" placeholder="Enter roll number" required />

        <label for="gender">Gender</label>
        <input type="text" id="gender" placeholder="Enter gender" />

        <label for="faculty">Faculty / Department</label>
        <input type="text" id="faculty" placeholder="Enter faculty / department" />

        <label for="mother">Mother Name</label>
        <input type="text" id="mother" placeholder="Enter mother name" />

        <label for="father">Father Name</label>
        <input type="text" id="father" placeholder="Enter father name" />

        <label for="parent_mobile">Parent Mobile Number</label>
        <input type="text" id="parent_mobile" placeholder="Enter parent mobile number" required />

        <button type="submit">Register Student</button>
      </form>

      <div class="button-row" style="margin-top: 16px;">
        <a href="select-role.html?mode=register" class="secondary-btn">Back</a>
      </div>

      <p id="message" class="message" style="text-align:center;"></p>
    </div>
  </div>

  <div class="footer-credit">Designed by R Siddhesh Aryan</div>

  <script>
    const form = document.getElementById("studentRegisterForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        roll: document.getElementById("roll").value.trim(),
        gender: document.getElementById("gender").value.trim(),
        faculty: document.getElementById("faculty").value.trim(),
        mother: document.getElementById("mother").value.trim(),
        father: document.getElementById("father").value.trim(),
        parent_mobile: document.getElementById("parent_mobile").value.trim()
      };

      try {
        const response = await fetch("/register/student", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          message.textContent = "Student registered successfully.";
          form.reset();

          setTimeout(() => {
            window.location.href = `student.html?roll=${encodeURIComponent(payload.roll)}`;
          }, 900);
        } else {
          message.textContent = result.message || "Student registration failed.";
        }
      } catch (error) {
        message.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>
</html>

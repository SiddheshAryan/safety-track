<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#b8e3d3,#c5ddf0);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:22px;
box-shadow:0 18px 45px rgba(0,0,0,0.15);
width:520px;
}

h2{
text-align:center;
color:#055f6b;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2f6fb8;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1e4e86;
}

.back{
display:block;
text-align:center;
margin-top:15px;
color:#2f6fb8;
text-decoration:none;
font-weight:bold;
}

.footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
font-weight:bold;
color:#1a4655;
}

</style>
</head>

<body>

<div class="card">

<h2>Student Registration</h2>

<form action="/register-student" method="POST">

<input name="name" placeholder="Student Name" required>

<input name="roll_number" placeholder="Roll Number" required>

<input name="gender" placeholder="Gender">

<input name="department" placeholder="Department">

<input name="faculty_id" placeholder="Faculty ID" required>

<input name="mother_name" placeholder="Mother Name">

<input name="father_name" placeholder="Father Name">

<input name="parent_mobile" placeholder="Parent Mobile Number">

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register Student</button>

</form>

<a class="back" href="/select-role.html?mode=register">Back</a>

</div>

<div class="footer">Designed by R Siddhesh Aryan</div>

</body>
</html>

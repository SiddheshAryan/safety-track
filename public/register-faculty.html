<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Registration</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#b8e3d3,#c5ddf0);
padding:20px;
}

.container{
width:100%;
max-width:520px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(16px);
border-radius:28px;
padding:40px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.title{
text-align:center;
font-size:32px;
font-weight:800;
color:#055f6b;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#4a6770;
margin-bottom:30px;
}

label{
font-weight:700;
display:block;
margin-bottom:6px;
color:#123a47;
}

input{
width:100%;
padding:13px;
margin-bottom:18px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
outline:none;
}

input:focus{
border-color:#4c8ed9;
box-shadow:0 0 0 4px rgba(76,142,217,0.15);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:700;
background:linear-gradient(135deg,#4c8ed9,#2f6fb8);
color:white;
cursor:pointer;
font-size:16px;
box-shadow:0 12px 24px rgba(76,142,217,0.28);
}

button:hover{
transform:translateY(-2px);
}

.back{
display:block;
text-align:center;
margin-top:16px;
text-decoration:none;
color:#2f6fb8;
font-weight:700;
}

.footer{
position:fixed;
bottom:12px;
width:100%;
text-align:center;
font-weight:700;
color:#1a4655;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Faculty Registration</div>
<div class="subtitle">Create a faculty account</div>

<form action="/register-faculty" method="POST">

<label>Faculty ID</label>
<input
type="text"
name="faculty_id"
placeholder="Enter Faculty ID"
required
>

<label>Faculty Name</label>
<input
type="text"
name="name"
placeholder="Enter Faculty Name"
required
>

<label>Department / Subject</label>
<input
type="text"
name="department"
placeholder="Example: Computer Science"
required
>

<label>Mobile Number</label>
<input
type="text"
name="mobile"
placeholder="Enter Mobile Number"
required
>

<label>Password</label>
<input
type="password"
name="password"
placeholder="Create Password"
required
>

<button type="submit">
Register Faculty
</button>

</form>

<a class="back" href="/select-role.html?mode=register">
Back
</a>

</div>

<div class="footer">
Designed by R Siddhesh Aryan
</div>

</body>
</html>

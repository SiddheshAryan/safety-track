<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Registration</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-center">
    <div class="card slide-in">
      <h2 class="page-title" style="text-align:center; margin-bottom: 10px;">Faculty Registration</h2>
      <p class="page-subtitle" style="text-align:center; margin-bottom: 22px;">
        Register faculty access for the safety tracker system.
      </p>

      <form id="facultyRegisterForm">
        <label for="name">Faculty Name</label>
        <input type="text" id="name" placeholder="Enter faculty name" required />

        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="Enter subject" />

        <label for="mobile">Mobile Number</label>
        <input type="text" id="mobile" placeholder="Enter mobile number" />

        <button type="submit">Register Faculty</button>
      </form>

      <div class="button-row" style="margin-top: 16px;">
        <a href="select-role.html?mode=register" class="secondary-btn">Back</a>
      </div>

      <p id="message" class="message" style="text-align:center;"></p>
    </div>
  </div>

  <div class="footer-credit">Designed by R Siddhesh Aryan</div>

  <script>
    const form = document.getElementById("facultyRegisterForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        subject: document.getElementById("subject").value.trim(),
        mobile: document.getElementById("mobile").value.trim()
      };

      try {
        const response = await fetch("/register/faculty", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          message.textContent = "Faculty registered successfully.";
          form.reset();

          setTimeout(() => {
            window.location.href = `faculty.html?name=${encodeURIComponent(payload.name)}`;
          }, 900);
        } else {
          message.textContent = result.message || "Faculty registration failed.";
        }
      } catch (error) {
        message.textContent = "Server error. Please try again.";
      }
    });
  </script>
</body>
</html>

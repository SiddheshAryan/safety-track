<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Safety Tracker</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #b8e3d3 0%, #c5ddf0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 72px;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.35;
      pointer-events: none;
    }

    body::before {
      top: -80px;
      left: -80px;
      background: rgba(255, 255, 255, 0.55);
    }

    body::after {
      bottom: -80px;
      right: -80px;
      background: rgba(76, 142, 217, 0.22);
    }

    .home-wrap {
      width: 100%;
      max-width: 1100px;
      display: flex;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .home-card {
      width: 100%;
      max-width: 820px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 18px 50px rgba(16, 55, 72, 0.14);
      border-radius: 30px;
      padding: 54px 40px 42px;
      text-align: center;
      animation: fadeUp 0.65s ease;
    }

    .brand-title {
      margin: 0 0 14px;
      font-size: 4rem;
      font-weight: 800;
      color: #055f6b;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .brand-subtitle {
      margin: 0 auto 34px;
      max-width: 620px;
      font-size: 1.16rem;
      color: #4a6770;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn-primary,
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      padding: 14px 22px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #4c8ed9, #2f6fb8);
      box-shadow: 0 14px 28px rgba(76, 142, 217, 0.28);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 34px rgba(76, 142, 217, 0.34);
    }

    .btn-secondary {
      color: #2f6fb8;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(76, 142, 217, 0.16);
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 24px rgba(16, 55, 72, 0.1);
      background: white;
    }

    .footer-credit {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 12px;
      text-align: center;
      font-size: 0.96rem;
      font-weight: 700;
      color: #1a4655;
      z-index: 2;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .home-card {
        padding: 38px 20px 30px;
        border-radius: 24px;
      }

      .brand-title {
        font-size: 2.7rem;
      }

      .brand-subtitle {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      .brand-title {
        font-size: 2.2rem;
      }

      .hero-buttons {
        flex-direction: column;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="home-wrap">
    <div class="home-card">
      <h1 class="brand-title">Safety Tracker</h1>
      <p class="brand-subtitle">
        A smart system that allows parents and faculty to track student safety and location in real time.
      </p>

      <div class="hero-buttons">
        <a href="/select-role.html?mode=login" class="btn-primary">Login</a>
        <a href="/select-role.html?mode=register" class="btn-secondary">Register</a>
      </div>
    </div>
  </div>

  <div class="footer-credit">Designed by R Siddhesh Aryan</div>
</body>
</html>
